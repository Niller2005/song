<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Vibrant modern music-themed gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF007A" />
      <stop offset="50%" stop-color="#7928CA" />
      <stop offset="100%" stop-color="#4F46E5" />
    </linearGradient>

    <!-- Professional drop shadow for depth -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.3" />
    </filter>

    <!-- Clip path to achieve the interlocking chain effect -->
    <clipPath id="overlap-clip">
      <circle cx="242" cy="314" r="50" />
    </clipPath>
  </defs>

  <!-- Background Squircle with safe margin -->
  <rect x="32" y="32" width="448" height="448" rx="112" fill="url(#bg-grad)" />

  <!-- Premium Inner Border for subtle glassmorphism atmosphere -->
  <rect x="32" y="32" width="448" height="448" rx="112" fill="none" stroke="#ffffff" stroke-width="4" stroke-opacity="0.15" />

  <!-- Unified Glyph with Drop Shadow -->
  <g filter="url(#shadow)">
    <!-- Capsule 1 (Left Note Head / Link 1) -->
    <g transform="translate(210, 324) rotate(-45)">
      <rect x="-30" y="-60" width="60" height="120" rx="30" fill="none" stroke="#ffffff" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" />
    </g>

    <!-- Capsule 2 (Right Note Head / Link 2) -->
    <g transform="translate(274, 303) rotate(-45)">
      <rect x="-30" y="-60" width="60" height="120" rx="30" fill="none" stroke="#ffffff" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" />
    </g>

    <!-- Interlocking Overlay (Draws top-right of Capsule 1 over Capsule 2) -->
    <g clip-path="url(#overlap-clip)">
      <g transform="translate(210, 324) rotate(-45)">
        <rect x="-30" y="-60" width="60" height="120" rx="30" fill="none" stroke="#ffffff" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" />
      </g>
    </g>

    <!-- Stem 1 -->
    <line x1="246" y1="184" x2="246" y2="310" stroke="#ffffff" stroke-width="22" stroke-linecap="round" />

    <!-- Stem 2 -->
    <line x1="310" y1="144" x2="310" y2="280" stroke="#ffffff" stroke-width="22" stroke-linecap="round" />

    <!-- Beam -->
    <line x1="246" y1="184" x2="310" y2="144" stroke="#ffffff" stroke-width="24" stroke-linecap="round" />
  </g>
</svg>
